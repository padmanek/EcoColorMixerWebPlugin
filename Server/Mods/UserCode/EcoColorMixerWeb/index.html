<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco Powder Color Calculator</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 0; padding: 1rem; background: #121417; color: #f1f4f8; }
    .app { max-width: 980px; margin: 0 auto; background: #1b2026; border: 1px solid #2f3742; border-radius: 14px; padding: 1rem; }
    .controls { display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.6rem; align-items: center; margin: 0.75rem 0; }
    input, button { border: 1px solid #3a4452; border-radius: 10px; background: #141920; color: #f1f4f8; padding: 0.55rem 0.7rem; }
    button { background: #2b7cff; border-color: #2b7cff; cursor: pointer; }
    .swatches { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem; margin: 0.75rem 0; }
    .swatch-card, .mix { border: 1px solid #2f3742; border-radius: 10px; padding: 0.65rem; background: #141920; }
    .swatch { width: 100%; height: 88px; border-radius: 8px; border: 1px solid rgb(255 255 255 / 20%); margin-bottom: 0.4rem; }
    .meta { font-size: 0.88rem; color: #b5bfca; }
    .mix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.65rem; }
    code { display: inline-block; background: #0f1318; border: 1px solid #2f3742; border-radius: 6px; padding: 0.1rem 0.35rem; }
    #picker { width: 38px; height: 38px; padding: 0; border-radius: 8px; }
  </style>
</head>
<body>
  <main class="app">
    <h2>Eco Powder Color Calculator</h2>
    <p class="meta">Uses in-game colorants from <code>ColorMixer.PossibleColorants</code>. Set target color and max total powders.</p>

    <div class="controls">
      <input id="hexInput" type="text" value="#8A67D4" maxlength="7" aria-label="Hex color" />
      <input id="picker" type="color" value="#8a67d4" aria-label="Color picker" />
      <label class="meta">Max total powders <input id="maxTotalPowders" type="number" min="1" max="100" value="8" style="width:4.8rem; margin-left:0.3rem" /></label>
      <button id="findBtn">Find best mixes</button>
    </div>

    <div class="meta" id="powderCapMeta">Game cap: 100 total powders (MixingComponent / ColorMixer limits)</div>

    <div class="swatches">
      <div class="swatch-card">
        <div id="targetSwatch" class="swatch"></div>
        <div>Target: <code id="targetHex"></code> <span id="targetRgb" class="meta"></span></div>
      </div>
      <div class="swatch-card">
        <div id="bestSwatch" class="swatch"></div>
        <div>Best match: <code id="bestHex"></code> <span id="bestRgb" class="meta"></span></div>
      </div>
    </div>

    <section>
      <strong>Top recipes</strong>
      <div id="mixResults" class="mix-grid"></div>
    </section>
  </main>

  <script>
    const powders = [
      { colorant: 'Iron Oxide', item: 'IronOxideItem', rgb: [255, 0, 0] },
      { colorant: 'Copper Hydroxide', item: 'CopperHydroxideItem', rgb: [0, 255, 0] },
      { colorant: 'Blue Powder', item: 'BluePowderItem', rgb: [0, 0, 255] },
      { colorant: 'Cyan Powder', item: 'CyanPowderItem', rgb: [0, 255, 255] },
      { colorant: 'Magenta Powder', item: 'MagentaPowderItem', rgb: [255, 0, 255] },
      { colorant: 'Yellow Powder', item: 'YellowPowderItem', rgb: [255, 255, 0] },
      { colorant: 'Charcoal Powder', item: 'CharcoalPowderItem', rgb: [0, 0, 0] },
      { colorant: 'White Powder', item: 'WhitePowderItem', rgb: [255, 255, 255] }
    ];

    const DEFAULT_MAX_TOTAL_POWDERS = 8;
    const GAME_MAX_TOTAL_POWDERS = 100;
    const MAX_RESULTS = 8;
    const BEAM_WIDTH = 3500;

    const clamp8 = (v) => Math.max(0, Math.min(255, Math.round(v)));
    const rgbToHex = ([r, g, b]) => '#' + [r, g, b].map(v => clamp8(v).toString(16).padStart(2, '0')).join('').toUpperCase();
    const hexToRgb = (hex) => {
      const clean = hex.trim().replace('#', '');
      if (!/^[0-9a-fA-F]{6}$/.test(clean)) return null;
      return [parseInt(clean.slice(0, 2), 16), parseInt(clean.slice(2, 4), 16), parseInt(clean.slice(4, 6), 16)];
    };
    const distanceSq = (a, b) => (a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2;

    function mixFromCounts(counts) {
      const total = counts.reduce((a, b) => a + b, 0);
      let r = 0, g = 0, b = 0;
      for (let i = 0; i < powders.length; i++) {
        if (!counts[i]) continue;
        r += powders[i].rgb[0] * counts[i];
        g += powders[i].rgb[1] * counts[i];
        b += powders[i].rgb[2] * counts[i];
      }
      return [clamp8(r / total), clamp8(g / total), clamp8(b / total)];
    }

    function searchBestMixes(target, maxTotalPowders) {
      let beam = [{ counts: Array(powders.length).fill(0), rgb: [0,0,0], powders: 0, dist: distanceSq(target, [0,0,0]) }];
      const candidates = [];

      for (let total = 1; total <= maxTotalPowders; total++) {
        const nextBeam = [];
        for (const state of beam) {
          for (let i = 0; i < powders.length; i++) {
            const counts = state.counts.slice();
            counts[i] += 1;
            const rgb = mixFromCounts(counts);
            const mix = { counts, rgb, powders: total, dist: distanceSq(target, rgb), hex: rgbToHex(rgb) };
            nextBeam.push(mix);
            candidates.push(mix);
          }
        }
        nextBeam.sort((a, b) => a.dist - b.dist);
        beam = nextBeam.slice(0, BEAM_WIDTH);
      }

      candidates.sort((a, b) => a.dist - b.dist || a.powders - b.powders);
      const deduped = [];
      const seen = new Set();
      for (const m of candidates) {
        const key = `${m.hex}-${m.counts.join('.')}`;
        if (seen.has(key)) continue;
        deduped.push(m);
        seen.add(key);
        if (deduped.length >= MAX_RESULTS) break;
      }
      return deduped;
    }

    function formatRecipe(counts) {
      return counts.map((count, i) => count > 0 ? `${powders[i].colorant} × ${count}` : null).filter(Boolean).join(', ');
    }

    function render(targetRgb, mixes) {
      const targetHex = rgbToHex(targetRgb);
      document.getElementById('targetHex').textContent = targetHex;
      document.getElementById('targetRgb').textContent = `rgb(${targetRgb.join(', ')})`;
      document.getElementById('targetSwatch').style.background = targetHex;

      const best = mixes[0];
      document.getElementById('bestHex').textContent = best.hex;
      document.getElementById('bestRgb').textContent = `rgb(${best.rgb.join(', ')})`;
      document.getElementById('bestSwatch').style.background = best.hex;

      const container = document.getElementById('mixResults');
      container.innerHTML = '';
      mixes.forEach((mix, idx) => {
        const div = document.createElement('article');
        div.className = 'mix';
        div.innerHTML = `<h3>#${idx + 1} ${mix.hex}</h3><div class="meta">${formatRecipe(mix.counts)}</div><div class="meta">RGB distance: ${Math.sqrt(mix.dist).toFixed(2)}</div><div class="meta">Total powders: ${mix.powders}</div>`;
        container.appendChild(div);
      });
    }

    function run() {
      const hexInput = document.getElementById('hexInput');
      const picker = document.getElementById('picker');
      const rgb = hexToRgb(hexInput.value);
      if (!rgb) { hexInput.style.borderColor = '#ef4444'; return; }
      hexInput.style.borderColor = '';
      const normalized = rgbToHex(rgb);
      hexInput.value = normalized;
      picker.value = normalized.toLowerCase();

      const maxInput = document.getElementById('maxTotalPowders');
      const requested = parseInt(maxInput.value, 10);
      const maxTotal = Number.isFinite(requested) ? Math.max(1, Math.min(GAME_MAX_TOTAL_POWDERS, requested)) : DEFAULT_MAX_TOTAL_POWDERS;
      maxInput.value = String(maxTotal);

      render(rgb, searchBestMixes(rgb, maxTotal));
    }

    function previewTarget(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return;
      const normalized = rgbToHex(rgb);
      document.getElementById('hexInput').value = normalized;
      document.getElementById('targetHex').textContent = normalized;
      document.getElementById('targetRgb').textContent = `rgb(${rgb.join(', ')})`;
      document.getElementById('targetSwatch').style.background = normalized;
    }

    document.getElementById('findBtn').addEventListener('click', run);
    document.getElementById('maxTotalPowders').addEventListener('change', run);
    document.getElementById('picker').addEventListener('input', (e) => previewTarget(e.target.value));
    document.getElementById('picker').addEventListener('change', (e) => { document.getElementById('hexInput').value = e.target.value.toUpperCase(); run(); });
    document.getElementById('hexInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });

    run();
  </script>
</body>
</html>
